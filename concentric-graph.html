<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>گراف مداری</title>
<meta name="theme-color" content="#070b18" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/6.0.0/echarts.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg-0: #070b18;
    --bg-1: #0c1226;
    --amber: #ffb454;
    --ice: #7dd3fc;
    --ink: #e9edf6;
    --muted: #8b93ab;
    --line: rgba(139, 147, 171, 0.14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Vazirmatn", Tahoma, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1100px 700px at 50% 46%, var(--bg-1) 0%, var(--bg-0) 68%),
      var(--bg-0);
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  #chart { user-select: none; -webkit-user-select: none; }

  /* حلقه‌های محو راداری پشت گراف */
  .rings {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    pointer-events: none;
    z-index: 0;
  }
  .rings::before {
    content: "";
    width: min(150vmin, 1300px); aspect-ratio: 1;
    border-radius: 50%;
    background:
      repeating-radial-gradient(circle,
        transparent 0 92px,
        var(--line) 92px 93px);
    mask: radial-gradient(circle, black 30%, transparent 74%);
    -webkit-mask: radial-gradient(circle, black 30%, transparent 74%);
    animation: drift 90s linear infinite;
  }
  @keyframes drift { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .rings::before { animation: none; }
  }

  #chart { position: fixed; inset: 0; z-index: 1; }

  /* سربرگ */
  header {
    position: fixed; top: 28px; right: 34px; z-index: 2;
    pointer-events: none;
  }
  header h1 {
    margin: 0;
    font-size: 22px; font-weight: 800; letter-spacing: -0.01em;
  }
  header p {
    margin: 6px 0 0;
    font-size: 12.5px; font-weight: 300; color: var(--muted);
    max-width: 300px; line-height: 1.8;
  }

  /* نوار آمار و راهنما */
  .panel {
    position: fixed; bottom: 26px; right: 34px; z-index: 2;
    display: flex; align-items: center; gap: 22px;
    padding: 12px 18px;
    border: 1px solid rgba(139,147,171,0.18);
    border-radius: 14px;
    background: rgba(10, 15, 33, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .chip { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot.amber { background: var(--amber); box-shadow: 0 0 10px rgba(255,180,84,.8); }
  .dot.ice   { background: var(--ice);   box-shadow: 0 0 10px rgba(125,211,252,.7); }
  .chip b {
    font-family: "IBM Plex Mono", monospace; font-weight: 500;
    color: var(--ink); font-size: 13px;
  }
  .sep { width: 1px; height: 20px; background: rgba(139,147,171,0.25); }
  .hint {
    position: fixed; bottom: 26px; left: 34px; z-index: 2;
    font-size: 11.5px; color: var(--muted); opacity: .75;
  }
</style>
</head>
<body>

<div class="rings"></div>
<div id="chart"></div>

<header>
  <h1>گراف مداری</h1>
  <p>اتصال گره‌های حلقه‌ی بیرونی به هاب‌های مرکزی — روی هر گره برو تا مسیرهاش روشن بشه.</p>
</header>

<div class="panel">
  <span class="chip"><span class="dot amber"></span> هاب داخلی <b id="st-in">–</b></span>
  <span class="sep"></span>
  <span class="chip"><span class="dot ice"></span> گره بیرونی <b id="st-out">–</b></span>
  <span class="sep"></span>
  <span class="chip">اتصال <b id="st-ln">–</b></span>
</div>
<div class="hint">نودها رو بکش · درگ فضای خالی = جابه‌جایی · اسکرول = زوم</div>

<script>
if (typeof echarts === "undefined") {
  document.write('<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"><\/script>');
}
</script>
<script>
if (typeof echarts === "undefined") {
  document.getElementById("chart").innerHTML =
    '<p style="padding:24px;font-family:Tahoma">ECharts لود نشد — دسترسی به CDN رو چک کن.</p>';
} else {

/* ================= داده‌ها ================= */
const inner = Array.from({length: 15}, (_, i) => "C" + (i + 1));
const outer = Array.from({length: 30}, (_, i) => "n" + (i + 1));

const LINKS_PER_INNER = 5;
const links = [];
for (let i = 0; i < inner.length; i++) {
  const base = Math.round((i / inner.length) * outer.length);
  for (let k = 0; k < LINKS_PER_INNER; k++) {
    const o = (base + Math.round((k * outer.length) / LINKS_PER_INNER) + (i % 3)) % outer.length;
    links.push([i, o]);
  }
}
// تضمین: هر گره‌ی بیرونی حداقل یک اتصال داشته باشه
const covered = new Set(links.map(l => l[1]));
for (let o = 0; o < outer.length; o++) {
  if (!covered.has(o)) { links.push([o % inner.length, o]); covered.add(o); }
}

/* ================= چیدمان ================= */
const R_RATIO_OUTER = 0.36;   // نسبت شعاع بیرونی به min(width,height)
const R_RATIO_INNER = 0.16;   // نسبت شعاع داخلی
const AMBER = "#ffb454", ICE = "#7dd3fc";

function getRadii() {
  const s = Math.min(window.innerWidth, window.innerHeight);
  return { rOut: s * R_RATIO_OUTER, rIn: s * R_RATIO_INNER };
}
function ring(names, radius, offset = -Math.PI / 2) {
  return names.map((name, i) => {
    const a = offset + (2 * Math.PI * i) / names.length;
    return { name, x: radius * Math.cos(a), y: radius * Math.sin(a), angle: a };
  });
}
// زاویه‌های نرمالایز‌شده — فقط یک‌بار حساب می‌شن
const innerAngles = inner.map((_, i) => -Math.PI / 2 + (2 * Math.PI * i) / inner.length);
const outerAngles = outer.map((_, i) => -Math.PI / 2 + (2 * Math.PI * i) / outer.length);

let { rOut, rIn } = getRadii();
let innerPos = ring(inner, rIn);
let outerPos = ring(outer, rOut);

/* ================= نودها ================= */
const innerNodes = innerPos.map(p => ({
  name: p.name, x: p.x, y: p.y,
  symbolSize: 40, category: 0,
  itemStyle: {
    color: {
      type: "radial", x: 0.35, y: 0.3, r: 1,
      colorStops: [
        { offset: 0, color: "#ffd9a0" },
        { offset: 0.55, color: AMBER },
        { offset: 1, color: "#d98423" }
      ]
    },
    borderColor: "rgba(255, 219, 166, 0.9)",
    borderWidth: 1.2,
    shadowColor: "rgba(255, 170, 60, 0.55)",
    shadowBlur: 22
  },
  label: {
    show: true, position: "inside",
    color: "#3a2405", fontWeight: 600, fontSize: 12,
    fontFamily: "IBM Plex Mono, monospace"
  }
}));

const outerNodes = outerPos.map(p => {
  return {
    name: p.name, x: p.x, y: p.y,
    symbolSize: 13, category: 1,
    itemStyle: {
      color: ICE,
      borderColor: "rgba(190, 233, 255, 0.9)",
      borderWidth: 1,
      shadowColor: "rgba(125, 211, 252, 0.55)",
      shadowBlur: 14
    },
    label: {
      show: true, position: "right",
      color: "#9fb4cc", fontSize: 10.5,
      fontFamily: "IBM Plex Mono, monospace",
      distance: 8
    }
  };
});

/* ================= لینک‌ها ================= */
const edges = links.map(([i, o]) => ({
  source: inner[i], target: outer[o],
  lineStyle: {
    color: "source",           // رنگ از هاب کهربایی
    opacity: 0.22, width: 1.1, curveness: 0.3,
    shadowColor: "rgba(255,170,60,0.25)", shadowBlur: 4
  }
}));

/* ================= نمودار ================= */
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const allNodes = [...innerNodes, ...outerNodes];
// ایندکس سراسری: داخلی‌ها 0..14 ، بیرونی‌ها 15..44
const linkIdx = links.map(([i, o]) => [i, inner.length + o]);
let chart = null;
function buildOption() {
  return {
  backgroundColor: "transparent",
  tooltip: {
    backgroundColor: "rgba(12, 18, 38, 0.92)",
    borderColor: "rgba(139,147,171,0.25)",
    borderWidth: 1,
    padding: [8, 14],
    textStyle: { color: "#e9edf6", fontFamily: "Vazirmatn, Tahoma", fontSize: 12.5 },
    extraCssText: "backdrop-filter: blur(8px); border-radius: 10px; direction: rtl;",
    formatter: p => {
      if (p.dataType === "edge") return p.data.source + " ⟶ " + p.data.target;
      const deg = links.filter(l =>
        (p.data.category === 0 ? inner[l[0]] : outer[l[1]]) === p.name).length;
      return "<b>" + p.name + "</b> · " + deg + " اتصال";
    }
  },
  series: [{
    type: "graph",
    layout: "none",
    roam: true,
    scaleLimit: { min: 0.3, max: 3 },
    data: allNodes,
    edges,
    categories: [{ name: "هاب" }, { name: "گره" }],
    emphasis: {
      focus: "adjacency",
      itemStyle: { shadowBlur: 34 },
      lineStyle: { opacity: 0.85, width: 2 },
      label: { fontWeight: 700 }
    },
    blur: {
      itemStyle: { opacity: 0.08 },
      lineStyle: { opacity: 0.02 },
      label: { opacity: 0.06 }
    },
    animationDuration: 1400,
    animationDurationUpdate: 0,
    animationEasing: "cubicOut"
  }]
  };
}

/* ================= فیزیک سفارشی =================
   هر نود یک «خانه» داره (جای دقیقش روی حلقه).
   در حالت سکون هیچ نیرویی نیست → حلقه‌ها کاملاً سر جاشونن.
   با درگ، فنر خانه + فنر لینک‌ها فعال می‌شن. */
const K_HOME = 0.045;   // سفتی فنرِ برگشت به خانه
const K_LINK = 0.012;   // جفت‌شدگی لینک‌ها (کشیده‌شدن همسایه‌ها)
const DAMP   = 0.86;    // میرایی — هرچه کمتر، تاب‌خوردن بیشتر

const sim = allNodes.map(n => ({
  hx: n.x, hy: n.y,   // خانه
  x: n.x,  y: n.y,    // موقعیت فعلی
  vx: 0,   vy: 0
}));
// بردار استراحت هر لینک (شکل اولیه)
const rest = linkIdx.map(([a, b]) => [sim[b].x - sim[a].x, sim[b].y - sim[a].y]);

let dragIdx = -1, rafId = null;

function step() {
  let energy = 0;
  for (let i = 0; i < sim.length; i++) {
    if (i === dragIdx) continue;
    const s = sim[i];
    s.vx += (s.hx - s.x) * K_HOME;
    s.vy += (s.hy - s.y) * K_HOME;
  }
  for (let e = 0; e < linkIdx.length; e++) {
    const [a, b] = linkIdx[e];
    const fx = (sim[b].x - sim[a].x - rest[e][0]) * K_LINK;
    const fy = (sim[b].y - sim[a].y - rest[e][1]) * K_LINK;
    if (a !== dragIdx) { sim[a].vx += fx; sim[a].vy += fy; }
    if (b !== dragIdx) { sim[b].vx -= fx; sim[b].vy -= fy; }
  }
  for (let i = 0; i < sim.length; i++) {
    if (i === dragIdx) continue;
    const s = sim[i];
    s.vx *= DAMP; s.vy *= DAMP;
    s.x += s.vx;  s.y += s.vy;
    energy += s.vx * s.vx + s.vy * s.vy
            + (s.hx - s.x) ** 2 * 0.001 + (s.hy - s.y) ** 2 * 0.001;
  }
  for (let i = 0; i < sim.length; i++) {
    allNodes[i].x = sim[i].x;
    allNodes[i].y = sim[i].y;
  }
  chart.setOption({ series: [{ data: allNodes }] });

  if (energy > 0.02 || dragIdx >= 0) rafId = requestAnimationFrame(step);
  else rafId = null;
}
function wake() { if (rafId === null) rafId = requestAnimationFrame(step); }

/* --- درگ دستی نودها (جدا از پنِ صفحه) --- */
function bindInteraction() {
  const zr = chart.getZr();
  chart.on("mousedown", p => {
    if (p.dataType === "node" && !reduceMotion) {
      dragIdx = p.dataIndex;
      chart.setOption({ series: [{ roam: "scale" }] });
    }
  });
  zr.on("mousemove", e => {
    if (dragIdx < 0) return;
    const pt = chart.convertFromPixel({ seriesIndex: 0 }, [e.offsetX, e.offsetY]);
    if (!pt) return;
    sim[dragIdx].x = pt[0]; sim[dragIdx].y = pt[1];
    sim[dragIdx].vx = 0;    sim[dragIdx].vy = 0;
    wake();
  });
  zr.on("mouseup", release);
  zr.on("globalout", release);
}
function release() {
  if (dragIdx < 0) return;
  const s = sim[dragIdx];
  s.hx = s.x; s.hy = s.y;
  for (let e = 0; e < linkIdx.length; e++) {
    const [a, b] = linkIdx[e];
    if (a === dragIdx || b === dragIdx) {
      rest[e] = [sim[b].x - sim[a].x, sim[b].y - sim[a].y];
    }
  }
  dragIdx = -1;
  chart.setOption({ series: [{ roam: true }] });
  wake();
}
window.addEventListener("mouseup", release);

/* --- ساخت / بازساخت چارت --- */
function initChart() {
  if (chart) chart.dispose();   // بازساخت کامل → فیتِ اولیه دوباره اجرا می‌شه
  chart = echarts.init(document.getElementById("chart"));
  chart.setOption(buildOption());
  bindInteraction();
}
initChart();

/* آمار پنل */
document.getElementById("st-in").textContent = inner.length;
document.getElementById("st-out").textContent = outer.length;
document.getElementById("st-ln").textContent = links.length;

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const oldOut = rOut, oldIn = rIn;
    ({ rOut, rIn } = getRadii());
    const scaleOut = rOut / oldOut, scaleIn = rIn / oldIn;

    for (let i = 0; i < sim.length; i++) {
      const s = sim[i];
      const sc = i < inner.length ? scaleIn : scaleOut;
      s.hx *= sc; s.hy *= sc;
      s.x  *= sc; s.y  *= sc;
      s.vx = 0;   s.vy = 0;
      allNodes[i].x = s.x;
      allNodes[i].y = s.y;
    }
    for (let e = 0; e < linkIdx.length; e++) {
      const [a, b] = linkIdx[e];
      rest[e] = [sim[b].x - sim[a].x, sim[b].y - sim[a].y];
    }
    initChart();   // بازساخت کامل — گراف دوباره با کانواس جدید فیت می‌شه
  }, 120);
});
}
</script>
</body>
</html>
